services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: event-tracker-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - event-tracker-network
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: event-tracker-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: activity_db
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - event-tracker-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: event-tracker-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - event-tracker-network
    restart: unless-stopped

  api:
    build: ./api
    container_name: event-tracker-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      API_PORT: 3000
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_QUEUE: user_activities
      DB_TYPE: mongodb
      MONGODB_URL: mongodb://admin:admin123@mongodb:27017/activity_db?authSource=admin
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 50
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - event-tracker-network
    restart: unless-stopped

  consumer:
    build: ./consumer
    container_name: event-tracker-consumer
    environment:
      NODE_ENV: development
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_QUEUE: user_activities
      DB_TYPE: mongodb
      MONGODB_URL: mongodb://admin:admin123@mongodb:27017/activity_db?authSource=admin
      MAX_RETRY_COUNT: 3
    volumes:
      - ./consumer:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - event-tracker-network
    restart: unless-stopped

networks:
  event-tracker-network:
    driver: bridge

volumes:
  rabbitmq_data:
  mongodb_data: